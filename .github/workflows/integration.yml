name: Integration

# Live-API integration tests. Gated on the repository secret POLI_PAGE_API_KEY
# (pp_test_*); jobs no-op when unset. Runs on push to main + nightly so PRs
# stay snappy.

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_INTEGRATION != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      POLI_PAGE_API_KEY: ${{ secrets.POLI_PAGE_API_KEY }}
      POLI_PAGE_TEST_BASE_URL: ${{ secrets.POLI_PAGE_TEST_BASE_URL }}
      POLI_PAGE_TEST_PROJECT: ${{ vars.POLI_PAGE_TEST_PROJECT || 'getting-started' }}
      POLI_PAGE_TEST_TEMPLATE: ${{ vars.POLI_PAGE_TEST_TEMPLATE || 'welcome' }}
      POLI_PAGE_TEST_VERSION: ${{ vars.POLI_PAGE_TEST_VERSION || '1.0.0' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=:all: -e ".[dev]"

      - name: Skip when API key is missing
        if: env.POLI_PAGE_API_KEY == ''
        run: |
          echo "POLI_PAGE_API_KEY secret is not set — integration suite cannot run." >&2
          echo "Set the repository secret to enable this workflow." >&2

      - name: Integration tests
        if: env.POLI_PAGE_API_KEY != ''
        run: python -m pytest tests/integration/ -m integration -v
