name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # Why: codecov-action v5 uses OIDC for tokenless uploads on public repos.

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        # Bash on every runner — keeps the auto-skip conditionals portable on Windows.
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . || echo "pyproject.toml exists but install failed — check it"
          elif [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No manifest yet — skipping install"
          fi

      - name: Lint
        run: |
          if python -m ruff --version >/dev/null 2>&1; then
            python -m ruff check .
            python -m ruff format --check .
          else
            echo "ruff not installed — skipping lint"
          fi

      - name: Test
        run: |
          if python -m pytest --version >/dev/null 2>&1; then
            if [ -d tests ] && find tests \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
              if python -c "import pytest_cov" 2>/dev/null; then
                python -m pytest -v --cov=poli_page --cov-report=xml --cov-report=term
              else
                python -m pytest -v
              fi
            else
              echo "pytest available but no tests yet — skipping"
            fi
          else
            echo "pytest not installed — skipping test"
          fi

      - name: Upload coverage to Codecov
        # Why: only upload from one matrix slot to avoid duplicate reports;
        # skip silently when coverage.xml wasn't produced (e.g. pytest-cov absent).
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: coverage.xml
          fail_ci_if_error: false
