name: Publish to PyPI

# Tag-driven release. Pushing a `vX.Y.Z` tag publishes that version to PyPI
# via PEP 740 Trusted Publishing (OIDC; no long-lived token) and cuts the
# matching GitHub Release. A manual `workflow_dispatch` run publishes to
# TestPyPI only — for rehearsing the pipeline without burning a real
# version on pypi.org (PyPI uploads are immutable).
#
# One-time setup before this workflow can publish:
#   1. Register the PyPI Trusted Publisher for this repo:
#      project: poli-page
#      owner:   poli-page
#      repo:    sdk-python
#      workflow: publish.yml
#      environment: pypi-publish
#   2. For rehearsals, register the same pending publisher on test.pypi.org.
#   3. Configure the `pypi-publish` repository environment with required
#      reviewers (so the run pauses for human approval before upload).
#
# Per release:
#   1. Bump src/poli_page/_version.py, move [Unreleased] in CHANGELOG.md,
#      commit (`chore(release): X.Y.Z`) and push to main; wait for CI green.
#   2. (Optional) Rehearse: run this workflow manually -> TestPyPI.
#   3. Tag and push:  git tag vX.Y.Z && git push origin vX.Y.Z
#      The tag version must match _version.py exactly, or the run fails.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Manual runs publish to TestPyPI only (production goes through a vX.Y.Z tag push)."
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi

permissions:
  contents: write   # to create the GitHub Release
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-publish
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve version and target
        id: rel
        run: |
          set -euo pipefail
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__\s*=\s*\"([^\"]+)\"", open("src/poli_page/_version.py").read()).group(1))')"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push -> production release to PyPI. The tag version must
            # match _version.py exactly (PEP 440 normalized form, no hyphen).
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
              echo "Refusing to publish: tag ${GITHUB_REF_NAME} does not match _version.py ($PKG_VERSION)." >&2
              exit 1
            fi
            echo "target=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "target=testpypi" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing poli-page@$PKG_VERSION via ${{ github.event_name }}."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=:all: -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Typecheck (pyright)
        run: python -m pyright

      - name: Unit tests
        run: python -m pytest tests/unit/ tests/test_smoke.py -q

      - name: Build wheel + sdist
        run: python -m build

      - name: Inspect with twine check
        run: python -m twine check dist/*

      - name: Publish to PyPI via Trusted Publishing
        if: steps.rel.outputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Publish to TestPyPI via Trusted Publishing
        if: steps.rel.outputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

      - name: Extract CHANGELOG section for this version
        if: steps.rel.outputs.target == 'pypi'
        id: changelog
        run: |
          set -euo pipefail
          # Slice between `## [X.Y.Z]` and the next `## [` heading. Falls back
          # to a stub note if the version isn't documented yet — so the
          # release never blocks on copy.
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="${{ steps.rel.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/        { exit }
            capture                    { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "_See [CHANGELOG.md](CHANGELOG.md) for details._" > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.rel.outputs.target == 'pypi'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The tag already exists (it triggered this run); attach the built
          # artifacts and the carved release notes to it.
          gh release create "v${{ steps.rel.outputs.version }}" \
            --title "v${{ steps.rel.outputs.version }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            dist/*
